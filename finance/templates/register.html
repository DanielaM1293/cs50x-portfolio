{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block main %}
<div class="flex justify-center items-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
                 Create Account
            </h1>

            <p class="text-gray-500 mt-2">
                Join C$50 Finance and start investing today
            </p>
        </div>

        <form action="/register" method="post" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>

                <input
                    autocomplete="off"
                    autofocus
                    name="username"
                    placeholder="Choose a username"
                    type="text"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>

                <input
                    name="password"
                    placeholder="Create a password"
                    type="password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Confirm Password
                </label>

                <input
                    name="confirmation"
                    placeholder="Repeat your password"
                    type="password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500"
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 rounded-xl text-white font-bold bg-gradient-to-r from-purple-500 to-pink-500 shadow-lg hover:scale-105 transition duration-200"
            >
                Create Account
            </button>

        </form>

    </div>

</div>
{% endblock %}
