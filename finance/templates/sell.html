{% extends "layout.html" %}

{% block title %}
    Sell
{% endblock %}

{% block main %}
<div class="max-w-md mx-auto">

    <div class="bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent">
                 Sell Stocks
            </h1>

            <p class="text-gray-500 mt-2">
                Sell shares from your portfolio
            </p>
        </div>

        <form action="/sell" method="post" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Select Stock
                </label>

                <select
                    name="symbol"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500"
                >
                    <option disabled selected>
                        Choose a symbol
                    </option>

                    {% for stock in stocks %}
                        <option value="{{ stock.symbol }}">
                            {{ stock.symbol }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Number of Shares
                </label>

                <input
                    name="shares"
                    type="number"
                    min="1"
                    placeholder="Enter shares"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500"
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 rounded-xl text-white font-bold bg-gradient-to-r from-red-500 to-pink-500 shadow-lg hover:scale-105 transition duration-200"
            >
                Sell Shares
            </button>

        </form>

    </div>

</div>
{% endblock %}
