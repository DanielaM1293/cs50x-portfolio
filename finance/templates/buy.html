{% extends "layout.html" %}

{% block title %}
    Buy
{% endblock %}

{% block main %}
<div class="max-w-md mx-auto">

    <div class="bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-green-500 to-emerald-600 bg-clip-text text-transparent">
                🛒 Buy Stocks
            </h1>
            <p class="text-gray-500 mt-2">
                Purchase shares of your favorite companies
            </p>
        </div>

        <form action="/buy" method="post" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Stock Symbol
                </label>

                <input
                    autocomplete="off"
                    autofocus
                    name="symbol"
                    placeholder="AAPL"
                    type="text"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Number of Shares
                </label>

                <input
                    name="shares"
                    placeholder="10"
                    type="number"
                    min="1"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 rounded-xl text-white font-bold bg-gradient-to-r from-green-500 to-emerald-600 shadow-lg hover:scale-105 transition duration-200"
            >
                Buy Shares
            </button>

        </form>

    </div>

</div>
{% endblock %}
