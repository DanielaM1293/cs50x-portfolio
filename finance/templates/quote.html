{% extends "layout.html" %}

{% block title %}
    Quote
{% endblock %}

{% block main %}
<div class="flex justify-center items-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-500 to-blue-600 bg-clip-text text-transparent">
                📈 Stock Quote
            </h1>

            <p class="text-gray-500 mt-2">
                Get the latest stock price instantly
            </p>
        </div>

        <form action="/quote" method="post" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Stock Symbol
                </label>

                <input
                    autocomplete="off"
                    autofocus
                    name="symbol"
                    placeholder="AAPL"
                    type="text"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 rounded-xl text-white font-bold bg-gradient-to-r from-cyan-500 to-blue-600 shadow-lg hover:scale-105 transition duration-200"
            >
                Get Quote 
            </button>

        </form>

    </div>

</div>
{% endblock %}
