{% extends "layout.html" %}

{% block title %}
    Quote
{% endblock %}

{% block main %}
<div class="flex justify-center">

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl p-8 text-center">

        <div class="text-6xl mb-4">
            📈
        </div>

        <h1 class="text-3xl font-extrabold text-gray-800 mb-2">
            {{ quote.name }}
        </h1>

        <p class="text-lg text-gray-500 mb-6">
            Symbol: <span class="font-bold text-blue-600">{{ quote.symbol }}</span>
        </p>

        <div class="bg-gradient-to-r from-green-400 to-emerald-500 rounded-2xl p-6 text-white">
            <p class="text-sm uppercase tracking-wider opacity-80">
                Current Price
            </p>

            <p class="text-4xl font-black mt-2">
                {{ quote.price | usd }}
            </p>
        </div>

        <a
            href="/quote"
            class="inline-block mt-6 px-6 py-3 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold shadow-lg hover:scale-105 transition"
        >
            Search Another Stock 🔍
        </a>

    </div>

</div>
{% endblock %}
