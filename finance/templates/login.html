{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}
<div class="flex justify-center items-center">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                🔐 Welcome Back
            </h1>

            <p class="text-gray-500 mt-2">
                Sign in to access your portfolio
            </p>
        </div>

        <form action="/login" method="post" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Username
                </label>

                <input
                    autocomplete="off"
                    autofocus
                    name="username"
                    placeholder="Enter your username"
                    type="text"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Password
                </label>

                <input
                    name="password"
                    placeholder="Enter your password"
                    type="password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <button
                type="submit"
                class="w-full py-3 rounded-xl text-white font-bold bg-gradient-to-r from-blue-500 to-indigo-600 shadow-lg hover:scale-105 transition duration-200"
            >
                Log In 🚀
            </button>

        </form>

    </div>

</div>
{% endblock %}
