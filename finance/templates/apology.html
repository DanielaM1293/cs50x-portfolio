{% extends "layout.html" %}

{% block title %}
    Apology
{% endblock %}

{% block main %}
<div class="flex flex-col items-center justify-center text-center">

    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-2xl">

        <h1 class="text-4xl font-extrabold text-red-500 mb-2">
             Oops!
        </h1>

        <p class="text-gray-500 mb-6">
            Something went wrong.
        </p>

        <img
            alt="{{ top }}"
            src="https://api.memegen.link/images/custom/{{ top | urlencode }}/{{ bottom | urlencode }}.jpg?background=https://i.imgur.com/CsCgN7Ll.png&width=400"
            title="{{ top }}"
            class="mx-auto rounded-2xl shadow-lg border-4 border-gray-100 hover:scale-105 transition duration-300"
        >

        <a href="/"
           class="inline-block mt-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white px-6 py-3 rounded-xl shadow-md hover:scale-105 transition">
             Back Home
        </a>

    </div>

</div>
{% endblock %}
